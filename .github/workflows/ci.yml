name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install Python (project version)
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Ruff check (library and tooling)
        run: uv run ruff check src scripts
