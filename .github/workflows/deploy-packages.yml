name: Deploy generated packages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      templates:
        description: 'Comma-separated template dates to deploy (leave empty for all)'
        required: false
        default: ''

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        template: [2025-08-12, 2026-01-31]

    steps:
      - name: Filter templates (workflow_dispatch only)
        id: filter
        run: |
          INPUT="${{ github.event.inputs.templates }}"
          TEMPLATE="${{ matrix.template }}"
          if [ -n "$INPUT" ]; then
            if echo "$INPUT" | tr ',' '\n' | grep -qx "$TEMPLATE"; then
              echo "skip=false" >> "$GITHUB_OUTPUT"
            else
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install uv
        if: steps.filter.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        if: steps.filter.outputs.skip != 'true'
        run: uv python install

      - name: Configure git credentials for private deps
        if: steps.filter.outputs.skip != 'true'
        run: git config --global url."https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        if: steps.filter.outputs.skip != 'true'
        run: uv sync

      - name: Install Git LFS
        if: steps.filter.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-lfs

      - name: Run export pipeline
        if: steps.filter.outputs.skip != 'true'
        run: uv run python -m src.lic_dsf_export --template ${{ matrix.template }}

      - name: Deploy to target repo
        if: steps.filter.outputs.skip != 'true'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: ./scripts/deploy.sh ${{ matrix.template }}
