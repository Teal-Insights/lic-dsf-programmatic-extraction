<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" ry="18" fill="#1D6F42"/>
  <!-- White document shape -->
  <rect x="28" y="14" width="44" height="56" rx="3" fill="white" opacity="0.15"/>
  <!-- Grid lines -->
  <line x1="28" y1="30" x2="72" y2="30" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="28" y1="44" x2="72" y2="44" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="28" y1="58" x2="72" y2="58" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="50" y1="14" x2="50" y2="70" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <!-- Bold X -->
  <text x="50" y="60" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2">X</text>
  <!-- Bottom label bar -->
  <rect x="0" y="76" width="100" height="24" rx="0" fill="#155232"/>
  <rect x="0" y="76" width="100" height="24" rx="18" fill="#155232"/>
  <rect x="0" y="76" width="100" height="12" fill="#155232"/>
  <text x="50" y="91" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">EXCEL</text>
</svg>
