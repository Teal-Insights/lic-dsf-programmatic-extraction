<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" preserveAspectRatio="xMidYMid meet">
  <!-- Document body -->
  <rect x="8" y="8" width="72" height="104" rx="5" fill="#f0f0f0"/>
  <!-- Folded corner -->
  <polygon points="60,8 80,8 80,28" fill="#c8c8c8"/>
  <polygon points="60,8 60,28 80,28" fill="#e0e0e0"/>
  <!-- Green header band -->
  <rect x="8" y="34" width="72" height="22" fill="#1D6F42"/>
  <!-- Spreadsheet rows -->
  <rect x="14" y="62" width="60" height="6" rx="1" fill="#d6e8dc"/>
  <rect x="14" y="72" width="60" height="6" rx="1" fill="#eaf3ec"/>
  <rect x="14" y="82" width="60" height="6" rx="1" fill="#d6e8dc"/>
  <rect x="14" y="92" width="60" height="6" rx="1" fill="#eaf3ec"/>
  <!-- Column dividers in rows -->
  <line x1="38" y1="62" x2="38" y2="98" stroke="#b0d4bb" stroke-width="1"/>
  <line x1="58" y1="62" x2="58" y2="98" stroke="#b0d4bb" stroke-width="1"/>
  <!-- X label in green band -->
  <text x="34" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">X</text>
  <!-- XLSM badge -->
  <rect x="28" y="100" width="32" height="14" rx="3" fill="#1D6F42"/>
  <text x="44" y="109" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">XLSM</text>
  <!-- Macro lightning bolt badge -->
  <circle cx="72" cy="100" r="10" fill="#F9A825"/>
  <polygon points="75,91 69,100 73,100 70,109 76,99 72,99" fill="white"/>
</svg>
